<!DOCTYPE html>
<html>
<head>
<title>Wellness AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    display:flex;
    justify-content:center;
    padding:20px;
}

.container {
    background:white;
    padding:20px;
    border-radius:20px;
    width:350px;
    text-align:center;
}

button, input {
    width:100%;
    padding:10px;
    margin:6px 0;
    border-radius:10px;
}

button {
    background:#667eea;
    color:white;
    border:none;
}

.card {
    background:#f4f6f9;
    padding:15px;
    border-radius:15px;
    margin-top:10px;
}

video {
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🧠 Wellness AI</h2>

<!-- MODE -->
<h3>Select Mode</h3>
<button onclick="manualMode()">Manual</button>
<button onclick="aiMode()">AI Detection</button>

<!-- MANUAL -->
<div id="manualSection">
<form id="logForm">
<input type="number" id="mood" placeholder="Mood (1-5)" required>
<input type="number" id="sleep" placeholder="Sleep hours" required>
<input type="number" id="work" placeholder="Work hours" required>
<input type="number" id="screen" placeholder="Screen time" required>
<button type="submit">Analyze</button>
</form>
</div>

<!-- AI -->
<div id="aiSection" style="display:none;">
<button onclick="startCamera()">Start Camera</button>
<video id="video" width="300" autoplay muted playsinline></video>
<p id="emotionText">AI not started</p>
</div>

<div id="result"></div>

</div>

<script>

let modelsLoaded = false;
let lastMood = null;
let detectionInterval;

// ================= MODE =================
function manualMode(){
    document.getElementById("manualSection").style.display = "block";
    document.getElementById("aiSection").style.display = "none";
}

function aiMode(){
    document.getElementById("manualSection").style.display = "none";
    document.getElementById("aiSection").style.display = "block";
}

// ================= LOAD MODELS =================
async function loadModels(){
    const MODEL_URL = "https://justadudewhohacks.github.io/face-api.js/models";

    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);

    modelsLoaded = true;
}

// ================= CAMERA =================
async function startCamera(){
    const video = document.getElementById("video");

    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video:true });
        video.srcObject = stream;

        document.getElementById("emotionText").innerText = "Loading AI...";

        await loadModels();

        document.getElementById("emotionText").innerText = "Detecting...";

        startDetection();

    } catch {
        document.getElementById("emotionText").innerText =
            "❌ Allow camera access";
    }
}

// ================= DETECTION =================
function startDetection(){
    const video = document.getElementById("video");

    clearInterval(detectionInterval);

    detectionInterval = setInterval(async () => {

        if (!modelsLoaded || video.readyState !== 4) return;

        const result = await faceapi
            .detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
            .withFaceExpressions();

        if (!result) {
            document.getElementById("emotionText").innerText = "No face detected";
            return;
        }

        const exp = result.expressions;

        const sorted = Object.entries(exp)
            .sort((a,b)=>b[1]-a[1]);

        const mainEmotion = sorted[0][0];

        document.getElementById("emotionText").innerText =
            "Emotion: " + mainEmotion;

        const moodMap = {
            happy:5,
            surprised:4,
            neutral:3,
            sad:2,
            fearful:2,
            angry:1,
            disgusted:1
        };

        const mood = moodMap[mainEmotion] || 3;

        document.getElementById("mood").value = mood;

        // 🔥 OPTIMIZATION: CALL ONLY IF CHANGED
        if(mood !== lastMood){
            lastMood = mood;
            autoAnalyze(mood);
        }

    }, 3000); // less frequent → saves API calls
}

// ================= AUTO ANALYZE =================
async function autoAnalyze(mood){

    const data = {
        mood: mood,
        sleep: 6,
        work_hours: 6,
        screen_time: 5
    };

    try {
        const res = await fetch("https://wellness-app-52g4.onrender.com/log",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        });

        const result = await res.json();

        document.getElementById("result").innerHTML = `
        <div class="card">
        <h3>🔥 Score: ${result.burnout_score}</h3>
        <p>${result.insight}</p>
        </div>
        `;

    } catch {
        console.log("Server sleeping...");
    }
}

// ================= MANUAL =================
document.getElementById("logForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const data = {
        mood:Number(mood.value),
        sleep:Number(sleep.value),
        work_hours:Number(work.value),
        screen_time:Number(screen.value)
    };

    try {
        const res = await fetch("https://wellness-app-52g4.onrender.com/log",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(data)
        });

        const result = await res.json();

        document.getElementById("result").innerHTML = `
        <div class="card">
        <h3>🔥 Score: ${result.burnout_score}</h3>
        <p>${result.insight}</p>
        </div>
        `;

    } catch {
        alert("Server waking up...");
    }
});

</script>

</body>
</html>
